[profile.default]
src            = "src"
out            = "out"
libs           = ["lib"]
test           = "test"
script         = "script"
solc           = "0.8.24"
optimizer      = true
optimizer_runs = 200
via_ir         = false
fuzz           = { runs = 10000, seed = "0x1" }
invariant      = { runs = 256, depth = 15 }
gas_reports    = ["*"]

remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "@openzeppelin-upgradeable/=lib/openzeppelin-contracts-upgradeable/",
  "@layerzero/=lib/layerzero-v2/",
  "@eigenlayer/=lib/eigenlayer-middleware/",
  "@mud/=lib/mud/packages/",
  "@erc6551/=lib/erc6551/src/",
  "forge-std/=lib/forge-std/src/",
]

[profile.default.rpc_endpoints]
development  = "http://127.0.0.1:8545"
l3_testnet   = "${L3_RPC_URL}"
arbitrum     = "${L2_RPC_URL}"
mainnet      = "${MAINNET_RPC_URL}"

[profile.default.etherscan]
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }
mainnet  = { key = "${ETHERSCAN_API_KEY}" }

[profile.ci]
fuzz      = { runs = 50000 }
invariant = { runs = 1000, depth = 30 }

[profile.lite]
optimizer_runs = 1
fuzz           = { runs = 256 }