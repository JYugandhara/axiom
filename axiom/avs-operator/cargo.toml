[package]
name        = "avs-operator"
version     = "0.1.0"
edition     = "2021"
authors     = ["AXIOM Team"]
description = "AXIOM EigenLayer AVS Operator Node — decentralized game compute with slashing"
repository  = "https://github.com/axiom-world/avs-operator"
license     = "MIT"

[[bin]]
name = "avs-operator"
path = "src/main.rs"

# ── Async runtime ─────────────────────────────────────────────
[dependencies]
tokio           = { version = "1.36",  features = ["full"] }
tokio-stream    = "0.1"
futures         = "0.3"

# ── Ethereum / EVM ────────────────────────────────────────────
ethers          = { version = "2.0",   features = ["ws", "rustls"] }
ethers-contract = "2.0"
ethers-signers  = "2.0"

# ── Serialization ────────────────────────────────────────────
serde           = { version = "1.0",   features = ["derive"] }
serde_json      = "1.0"
bincode         = "1.3"

# ── Crypto / ZK ───────────────────────────────────────────────
sha3            = "0.10"
hex             = "0.4"
k256            = { version = "0.13",  features = ["ecdsa"] }

# ── ONNX inference (AI model) ─────────────────────────────────
ort             = { version = "1.17",  features = ["load-dynamic"] }
ndarray         = "0.15"

# ── HTTP / RPC ────────────────────────────────────────────────
reqwest         = { version = "0.11",  features = ["json", "rustls-tls"] }
jsonrpsee       = { version = "0.21",  features = ["client", "ws-client"] }

# ── Config / Environment ─────────────────────────────────────
dotenvy         = "0.15"
config          = "0.13"

# ── Logging / Tracing ────────────────────────────────────────
tracing         = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# ── Error handling ────────────────────────────────────────────
eyre            = "0.6"
thiserror       = "1.0"
anyhow          = "1.0"

# ── CLI ───────────────────────────────────────────────────────
clap            = { version = "4.4",   features = ["derive", "env"] }

# ── Metrics ───────────────────────────────────────────────────
prometheus      = "0.13"
axum            = "0.7"

# ── Utilities ────────────────────────────────────────────────
once_cell       = "1.19"
parking_lot     = "0.12"
dashmap         = "5.5"
rand            = "0.8"
chrono          = { version = "0.4",   features = ["serde"] }
uuid            = { version = "1.7",   features = ["v4", "serde"] }
num-traits      = "0.2"
priority-queue  = "1.3"

[dev-dependencies]
tokio-test      = "0.4"
mockall         = "0.12"
tempfile        = "3.10"
assert_matches  = "1.5"

[profile.release]
opt-level       = 3
lto             = true
codegen-units   = 1
panic           = "abort"
strip           = true

[profile.dev]
opt-level       = 0
debug           = true