# ─────────────────────────────────────────────────────────────
#  AXIOM L3 — OP Node Config (op-node-config.yaml)
#  Configures the L3 consensus client (op-node)
#  settling on Arbitrum One (L2) as the data availability layer.
# ─────────────────────────────────────────────────────────────

# L1 = Arbitrum One (our L2 acts as L1 for the L3)
l1:
  rpc: "${L2_RPC_URL}"          # Arbitrum One WebSocket RPC
  rpc-kind: standard
  beacon: ""                    # Not needed for OP Stack L3

# L2 = AXIOM L3 execution layer (op-geth)
l2:
  rpc: "http://op-geth:8551"    # Authenticated Engine API
  jwt-secret: "/secrets/jwt.hex"

# Rollup config
rollup:
  config: "/config/rollup.json" # Generated by op-node during genesis

# Sequencer mode (single sequencer for now — decentralize later)
sequencer:
  enabled: true
  stopped: false
  max-safe-lag: 1024

# P2P networking
p2p:
  listen-ip: "0.0.0.0"
  listen-tcp-port: 9003
  listen-udp-port: 9003
  bootnodes: []                 # Add peer enodes here for testnet

# Sync
sync:
  mode: execution-layer

# Metrics
metrics:
  enabled: true
  addr: "0.0.0.0"
  port: 7300

log:
  level: info
  format: json